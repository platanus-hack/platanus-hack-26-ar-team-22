services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: team22-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: team22
      POSTGRES_PASSWORD: team22
      POSTGRES_DB: team22
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U team22 -d team22"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
